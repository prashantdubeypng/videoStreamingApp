server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: video-upload-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/video_uploads}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      retries: 5
      properties:
        max.in.flight.requests.per.connection: 5
        delivery.timeout.ms: 120000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3s

logging:
  level:
    root: INFO
    com.animestream.upload: INFO

app:
  aws:
    region: ${AWS_REGION:us-east-1}
    s3-bucket: ${AWS_S3_BUCKET:anime-video-uploads}
    presign-ttl: ${AWS_PRESIGN_TTL:15m}
    multipart-part-size: ${AWS_MULTIPART_PART_SIZE:5242880}
  kafka:
    topics:
      video-uploaded: ${KAFKA_TOPIC_VIDEO_UPLOADED:video-uploaded}

idempotency:
  redis:
    enabled: ${IDEMPOTENCY_REDIS_ENABLED:false}
